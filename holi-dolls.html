  body::after {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse at center, rgba(10,0,30,0.35) 0%, rgba(10,0,30,0.6) 100%);
    z-index:0;
  }

  canvas#bgCanvas {
    position:fixed; inset:0; z-index:1; pointer-events:none;
  }

  .page { position:relative; z-index:10; text-align:center; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem,6vw,3.2rem);
    background: linear-gradient(135deg,#ff6bdf,#ffda00,#6bf7ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:4px;
    filter: drop-shadow(0 0 18px rgba(255,100,200,0.5));
    animation: titleFloat 3s ease-in-out infinite alternate;
  }

  @keyframes titleFloat {
    from { transform:translateY(0); }
    to   { transform:translateY(-8px); }
  }

  .subtitle {
    color: rgba(255,200,240,0.6);
    font-size:0.85rem;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:16px;
    font-style:italic;
  }

  /* doll stage */
  .stage {
    position: relative;
    width: 460px;
    height: 380px;
    margin: 0 auto;
  }

  /* colour powder ring */
  .ring {
    position:absolute;
    inset:-30px;
    border-radius:50%;
    background: conic-gradient(
      #ff1744 0deg, #ff6b00 45deg, #ffda00 90deg,
      #00e676 135deg, #00bcd4 180deg, #2979ff 225deg,
      #d500f9 270deg, #ff1744 360deg
    );
    opacity:0.18;
    filter:blur(18px);
    animation:ringRotate 8s linear infinite;
    z-index:0;
  }

  @keyframes ringRotate {
    from { transform:rotate(0deg); }
    to   { transform:rotate(360deg); }
  }

  /* ground */
  .ground {
    position:absolute;
    bottom:20px; left:50%; transform:translateX(-50%);
    width:260px; height:18px;
    background:rgba(255,255,255,0.07);
    border-radius:50%;
    filter:blur(6px);
    z-index:1;
  }

  /* doll wrapper */
  .doll-wrap {
    position:absolute;
    bottom:36px;
    z-index:5;
    animation: dollBob 2.2s ease-in-out infinite alternate;
  }
  .doll-wrap.girl { left:20px; animation-delay:0s; bottom:10px; }
  .doll-wrap.boy  { right:10px; animation-delay:0.5s; bottom:10px; }

  @keyframes dollBob {
    from { transform:translateY(0) rotate(-1deg); }
    to   { transform:translateY(-10px) rotate(1deg); }
  }

  /* arm around shoulder - boy's left arm stretches */
  .arm-around {
    animation: armHug 2.2s ease-in-out infinite alternate;
    transform-origin: top right;
  }
  @keyframes armHug {
    from { transform:rotate(-5deg); }
    to   { transform:rotate(5deg); }
  }

  /* colour splash behind dolls */
  .splash {
    position:absolute;
    border-radius:50%;
    filter:blur(22px);
    opacity:0;
    animation:splashPop 3s ease-in-out infinite;
    z-index:2;
  }
  .sp1{width:80px;height:80px;background:#ff6bdf;bottom:60px;left:40px;animation-delay:0s;}
  .sp2{width:70px;height:70px;background:#ffda00;bottom:80px;right:30px;animation-delay:1s;}
  .sp3{width:60px;height:60px;background:#6bf7ff;top:80px;left:60px;animation-delay:2s;}
  .sp4{width:50px;height:50px;background:#ff6b00;top:60px;right:50px;animation-delay:1.5s;}

  @keyframes splashPop {
    0%,100%{opacity:0;transform:scale(0.5);}
    50%{opacity:0.5;transform:scale(1.3);}
  }

  /* floating colour orbs */
  .orb {
    position:absolute;
    border-radius:50%;
    animation:orbFloat 3s ease-in-out infinite alternate;
    z-index:6;
  }
  @keyframes orbFloat {
    from{transform:translateY(0) scale(1);}
    to{transform:translateY(-20px) scale(1.2);}
  }

  /* label badges */
  .badge {
    position:absolute;
    bottom:-32px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:3px 14px;
    font-size:0.75rem;
    font-weight:700;
    color:white;
    white-space:nowrap;
    letter-spacing:1px;
  }

  /* colour balloon */
  .balloon-wrap {
    position:absolute;
    bottom:110px; left:50%; transform:translateX(-50%);
    z-index:8;
    animation: balloonDrift 2s ease-in-out infinite alternate;
  }
  @keyframes balloonDrift {
    from { transform:translateX(-50%) translateY(0) rotate(-6deg); }
    to   { transform:translateX(-50%) translateY(-16px) rotate(6deg); }
  }

  /* bottom message */
  .msg {
    margin-top:28px;
    font-size:1.05rem;
    color:rgba(255,255,255,0.7);
    line-height:1.7;
  }
  .msg strong { color:#ffda00; }

  /* colour dots row */
  .dots {
    display:flex; gap:10px; justify-content:center; margin-top:18px;
  }
  .dot {
    width:14px;height:14px;border-radius:50%;
    animation:dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100%{transform:scale(1);opacity:0.7;}
    50%{transform:scale(1.6);opacity:1;}
  }

  /* throw color button */
  .throw-btn {
    margin-top:22px;
    display:inline-block;
    padding:14px 36px;
    background:linear-gradient(135deg,#ff1744,#ff6b00,#ffda00,#00e676,#6bf7ff,#d500f9);
    background-size:300% 300%;
    animation:btnGradShift 3s ease infinite;
    border:none; border-radius:50px;
    font-family:'Nunito',sans-serif;
    font-size:1.05rem; font-weight:800;
    color:white; letter-spacing:1px;
    cursor:pointer;
    box-shadow:0 6px 28px rgba(255,100,200,0.45);
    transition:transform 0.15s, box-shadow 0.15s;
    position:relative; overflow:hidden;
  }
  .throw-btn:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 10px 36px rgba(255,100,200,0.6); }
  .throw-btn:active { transform:scale(0.96); }
  @keyframes btnGradShift {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* colour splat layer on girl doll (canvas overlay) */
  #girlSplat {
    position:absolute;
    top:0; left:0;
    width:110px; height:200px;
    pointer-events:none;
    z-index:9;
    opacity:0;
    transition:opacity 0.4s;
    border-radius:12px;
  }
  #girlSplat.visible { opacity:1; }

  /* wiggle reaction */
  @keyframes omgWiggle {
    0%{transform:rotate(0)}
    15%{transform:rotate(-12deg) scale(1.1)}
    30%{transform:rotate(12deg) scale(1.15)}
    45%{transform:rotate(-10deg)}
    60%{transform:rotate(8deg)}
    75%{transform:rotate(-4deg)}
    100%{transform:rotate(0) scale(1)}
  }
  .doll-wrap.girl.splashed { animation: omgWiggle 0.7s ease both, dollBob 2.2s ease-in-out 0.7s infinite alternate; }

  /* emoji burst popup */
  .emoji-pop {
    position:fixed;
    font-size:2rem;
    pointer-events:none;
    z-index:999;
    animation:emojiRise 1.4s ease-out forwards;
  }
  @keyframes emojiRise {
    0%  {opacity:1; transform:translateY(0) scale(0.5);}
    60% {opacity:1; transform:translateY(-80px) scale(1.3);}
    100%{opacity:0; transform:translateY(-140px) scale(0.8);}
  }

  /* clear / wash button */
  .clear-btn {
    margin-top:12px;
    display:inline-block;
    padding:13px 32px;
    background:linear-gradient(135deg,#21d4fd,#00bcd4,#0077b6);
    background-size:200% 200%;
    animation:waterShift 2s ease infinite;
    border:none; border-radius:50px;
    font-family:'Nunito',sans-serif;
    font-size:1rem; font-weight:800;
    color:white; letter-spacing:1px;
    cursor:pointer;
    box-shadow:0 6px 24px rgba(33,212,253,0.5);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .clear-btn:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 10px 32px rgba(33,212,253,0.7); }
  .clear-btn:active { transform:scale(0.96); }
  @keyframes waterShift {
    0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}
  }
  .doll-wrap.boy.throwing {
    animation: boyThrow 0.8s cubic-bezier(.36,.07,.19,.97) both !important;
  }
  @keyframes boyThrow {
    0%  { transform:rotate(0) translateX(0); }
    25% { transform:rotate(-18deg) translateX(-8px); }
    55% { transform:rotate(22deg) translateX(12px) scaleX(1.08); }
    80% { transform:rotate(-5deg) translateX(3px); }
    100%{ transform:rotate(0) translateX(0); }
  }
  .doll-wrap.girl.washing {
    animation: girlWash 1.5s ease both, dollBob 2.2s ease-in-out 1.5s infinite alternate !important;
  }
  @keyframes girlWash {
    0%  { transform:rotate(0); }
    20% { transform:rotate(10deg) translateY(-10px); }
    40% { transform:rotate(-12deg) translateY(-14px) scale(1.06); }
    60% { transform:rotate(7deg) translateY(-6px); }
    80% { transform:rotate(-3deg); }
    100%{ transform:rotate(0); }
  }
  #waterOverlay {
    position:absolute;
    top:0; left:0;
    width:110px; height:200px;
    pointer-events:none;
    z-index:10;
    opacity:0;
    transition:opacity 0.3s;
  }
  #waterOverlay.visible { opacity:1; }
  #bucketEl {
    position:absolute;
    font-size:2.8rem;
    pointer-events:none;
    z-index:50;
    display:none;
    animation: bucketFly 1s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes bucketFly {
    0%   { opacity:1; transform:translate(0,0) rotate(0deg) scale(1.2); }
    30%  { opacity:1; transform:translate(-60px,-50px) rotate(-30deg) scale(1.3); }
    65%  { opacity:1; transform:translate(-140px, 0px) rotate(-75deg) scale(1); }
    100% { opacity:0; transform:translate(-190px, 50px) rotate(-120deg) scale(0.4); }
  }
  .water-drop {
    position:fixed;
    pointer-events:none;
    z-index:30;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    animation: dropFall linear forwards;
  }
  @keyframes dropFall {
    0%   { opacity:1; transform:rotate(-45deg) scale(1) translateY(0); }
    100% { opacity:0; transform:rotate(-45deg) scale(0.3) translateY(120px); }
  }

</style>
</head>

    <!-- floating colour orbs -->
    <div class="orb" style="width:16px;height:16px;background:#ff6bdf;top:40px;left:30px;animation-delay:0s;filter:blur(2px);box-shadow:0 0 10px #ff6bdf;"></div>
    <div class="orb" style="width:12px;height:12px;background:#ffda00;top:60px;right:25px;animation-delay:0.7s;filter:blur(1px);box-shadow:0 0 8px #ffda00;"></div>
    <div class="orb" style="width:10px;height:10px;background:#6bf7ff;top:120px;left:20px;animation-delay:1.4s;box-shadow:0 0 8px #6bf7ff;"></div>
    <div class="orb" style="width:14px;height:14px;background:#00e676;bottom:90px;right:18px;animation-delay:2s;filter:blur(1px);box-shadow:0 0 10px #00e676;"></div>

  <div class="msg">
    <strong>May your colours never fade, Harshu!</strong>
  </div>

  <div class="dots">
    <div class="dot" style="background:#ff1744;animation-delay:0s;"></div>
    <div class="dot" style="background:#ff6b00;animation-delay:0.2s;"></div>
    <div class="dot" style="background:#ffda00;animation-delay:0.4s;"></div>
    <div class="dot" style="background:#00e676;animation-delay:0.6s;"></div>
    <div class="dot" style="background:#6bf7ff;animation-delay:0.8s;"></div>
    <div class="dot" style="background:#d500f9;animation-delay:1s;"></div>
    <div class="dot" style="background:#ff6bdf;animation-delay:1.2s;"></div>
  </div>

  <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:18px;">
    <button class="throw-btn" id="throwBtn" onclick="throwColorOnHer()">🎨 Throw Color on Her!</button>
    <button class="clear-btn" id="clearBtn" onclick="washHer()">💧 Wash Her Clean!</button>
  </div>
  <div id="bucketEl">🪣</div>
</div>

<script>
  // Floating powder particles in bg
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

  const cols = ['#ff6bdf','#ffda00','#6bf7ff','#ff6b00','#d500f9','#00e676','#ff1744'];
  const particles = [];

  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random()*canvas.width;
      this.y = canvas.height + 20;
      this.r = 3 + Math.random()*8;
      this.vx = (Math.random()-.5)*1.5;
      this.vy = -(0.4 + Math.random()*1.2);
      this.color = cols[Math.floor(Math.random()*cols.length)];
      this.alpha = 0.6 + Math.random()*0.4;
      this.life = 1;
      this.decay = 0.003 + Math.random()*0.005;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
      if (this.life <= 0) this.reset();
    }
    draw() {
      ctx.globalAlpha = this.life * this.alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  for (let i=0;i<60;i++) { const p=new P(); p.y=Math.random()*canvas.height; particles.push(p); }

  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();

  // ── Throw color on girl doll ──
  const splatCanvas = document.getElementById('girlSplat');
  const sc = splatCanvas.getContext('2d');
  const girlDoll = document.getElementById('girlDoll');
  const holiCols = ['#ff1744','#ff6b00','#ffda00','#00e676','#6bf7ff','#d500f9','#ff6bdf','#2979ff','#00bcd4'];
  let splatCount = 0;

  function throwColorOnHer() {
    splatCount++;
    splatCanvas.classList.add('visible');

    // Draw random colour splats on canvas
    for (let i = 0; i < 22; i++) {
      const x  = 8 + Math.random() * 94;
      const y  = 20 + Math.random() * 170;
      const r  = 4 + Math.random() * 18;
      const col = holiCols[Math.floor(Math.random() * holiCols.length)];
      sc.globalAlpha = 0.55 + Math.random() * 0.4;
      sc.fillStyle = col;

      // random splat shapes: circle or blob
      if (Math.random() > 0.4) {
        sc.beginPath();
        sc.arc(x, y, r, 0, Math.PI * 2);
        sc.fill();
        // star drips around
        for (let d = 0; d < 5; d++) {
          const ang = Math.random() * Math.PI * 2;
          const dist = r + Math.random() * 10;
          const dr = 1.5 + Math.random() * 4;
          sc.beginPath();
          sc.arc(x + Math.cos(ang)*dist, y + Math.sin(ang)*dist, dr, 0, Math.PI*2);
          sc.fill();
        }
      } else {
        // teardrop drip
        sc.beginPath();
        sc.ellipse(x, y, r*0.6, r, 0, 0, Math.PI*2);
        sc.fill();
      }
    }
    sc.globalAlpha = 1;

    // Wiggle the girl
    girlDoll.classList.remove('splashed');
    void girlDoll.offsetWidth; // reflow
    girlDoll.classList.add('splashed');

    // Burst particles from girl doll area
    const rect = girlDoll.getBoundingClientRect();
    const bx = rect.left + rect.width/2;
    const by = rect.top + rect.height/2;
    for (let i = 0; i < 50; i++) {
      const p2 = new P();
      p2.x = bx + (Math.random()-.5)*60;
      p2.y = by + (Math.random()-.5)*80;
      p2.vx = (Math.random()-.5)*12;
      p2.vy = (Math.random()-.5)*12 - 4;
      p2.r = 5 + Math.random()*12;
      p2.life = 1;
      particles.push(p2);
    }

    // Emoji burst
    const emojis = ['🎨','💦','🌈','✨','🎊','💥'];
    for (let e = 0; e < 5; e++) {
      const el = document.createElement('div');
      el.className = 'emoji-pop';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (rect.left + Math.random()*rect.width) + 'px';
      el.style.top  = (rect.top + Math.random()*40) + 'px';
      el.style.animationDelay = (e*0.12) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }

    // Button text changes with each throw
    const btn = document.getElementById('throwBtn');
    const msgs = ['🎨 Throw More Color!','💦 Drench Her!','🌈 More Colors!','🎊 Keep Going!','💥 Go Crazy!'];
    btn.textContent = msgs[Math.min(splatCount, msgs.length-1)];
  }

  // ── Wash / Clear girl doll ──
  const waterCanvas = document.getElementById('waterOverlay');
  const wc = waterCanvas.getContext('2d');
  const boyDoll = document.querySelector('.doll-wrap.boy');
  const bucketEl = document.getElementById('bucketEl');
  let washing = false;

  function washHer() {
    if (washing) return;
    washing = true;

    // Boy throws animation
    boyDoll.classList.remove('throwing');
    void boyDoll.offsetWidth;
    boyDoll.classList.add('throwing');

    // Show bucket flying from boy toward girl
    const boyRect = boyDoll.getBoundingClientRect();
    bucketEl.style.display = 'block';
    bucketEl.style.position = 'fixed';
    bucketEl.style.left = (boyRect.left + 20) + 'px';
    bucketEl.style.top  = (boyRect.top + 80) + 'px';
    void bucketEl.offsetWidth;
    bucketEl.style.animationName = 'none';
    bucketEl.offsetHeight;
    bucketEl.style.animationName = 'bucketFly';

    // Water splash droplets across screen after 0.5s
    setTimeout(() => {
      const girlRect = girlDoll.getBoundingClientRect();
      const cx = girlRect.left + girlRect.width/2;
      const cy = girlRect.top + girlRect.height/2;

      // Spawn many water drops
      for (let i = 0; i < 55; i++) {
        const drop = document.createElement('div');
        drop.className = 'water-drop';
        const size = 4 + Math.random() * 12;
        drop.style.cssText = `
          width:${size}px; height:${size*1.4}px;
          background: rgba(${100+Math.floor(Math.random()*80)},${200+Math.floor(Math.random()*55)},255,${0.6+Math.random()*0.4});
          left:${cx + (Math.random()-0.5)*60}px;
          top:${cy - 60 + Math.random()*80}px;
          animation-duration:${0.6+Math.random()*0.8}s;
          animation-delay:${Math.random()*0.3}s;
        `;
        document.body.appendChild(drop);
        setTimeout(() => drop.remove(), 1200);
      }

      // Draw water wash overlay (semi-transparent blue wave)
      wc.clearRect(0,0,110,200);
      for (let w = 0; w < 8; w++) {
        wc.globalAlpha = 0.12 + w*0.04;
        wc.fillStyle = `rgba(${60+w*15},${160+w*8},255,1)`;
        wc.beginPath();
        wc.ellipse(55, 80+w*12, 45+w*2, 18, 0, 0, Math.PI*2);
        wc.fill();
      }
      wc.globalAlpha = 1;
      waterCanvas.classList.add('visible');

      // Girl washing reaction
      girlDoll.classList.remove('washing', 'splashed');
      void girlDoll.offsetWidth;
      girlDoll.classList.add('washing');

      // Gradually clear the splat canvas
      let alpha = 1;
      const fadeInterval = setInterval(() => {
        alpha -= 0.04;
        splatCanvas.style.opacity = Math.max(0, alpha);
        if (alpha <= 0) {
          clearInterval(fadeInterval);
          sc.clearRect(0,0,110,200);
          splatCanvas.style.opacity = '';
          splatCanvas.classList.remove('visible');
        }
      }, 40);

      // Fade out water overlay
      setTimeout(() => {
        let wa = 1;
        const wFade = setInterval(() => {
          wa -= 0.05;
          waterCanvas.style.opacity = Math.max(0, wa);
          if (wa <= 0) {
            clearInterval(wFade);
            wc.clearRect(0,0,110,200);
            waterCanvas.style.opacity = '';
            waterCanvas.classList.remove('visible');
          }
        }, 40);
      }, 900);

      // Pop water emojis
      const waterEmojis = ['💦','🌊','✨','😲','🚿'];
      for (let e = 0; e < 5; e++) {
        const el2 = document.createElement('div');
        el2.className = 'emoji-pop';
        el2.textContent = waterEmojis[Math.floor(Math.random()*waterEmojis.length)];
        el2.style.left = (girlRect.left + Math.random()*girlRect.width) + 'px';
        el2.style.top  = (girlRect.top + Math.random()*50) + 'px';
        el2.style.animationDelay = (e*0.15) + 's';
        document.body.appendChild(el2);
        setTimeout(() => el2.remove(), 1600);
      }

      // Reset state
      setTimeout(() => {
        splatCount = 0;
        document.getElementById('throwBtn').textContent = '🎨 Throw Color on Her!';
        bucketEl.style.display = 'none';
        boyDoll.classList.remove('throwing');
        girlDoll.classList.remove('washing');
        washing = false;
      }, 2000);

    }, 500);
  }

</script>
